name: Daily Mega-Sub Merge

on:
  schedule:
    - cron: '0 3 * * *'      # каждый день в 3:00 по UTC (6:00 МСК)
  workflow_dispatch:         # можно запускать вручную кнопкой

# Даём права на запись в репозиторий (чтобы мог пушить файлы в папку subs/)
permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run merger script
        run: python merge_subs.py

      - name: Commit and push changes
        run: |
          git config --global user.name "MegaSub Bot"
          git config --global user.email "bot@github.com"
          
          # Добавляем только папку subs/
          git add subs/
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "Ничего не изменилось, коммитить нечего"
          else
            git commit -m "Auto-merge $(date +'%Y-%m-%d %H:%M UTC') - updated subs folder"
            git push
          fi