name: Daily Mega-Sub Merge

on:
  schedule:
    - cron: '0 3 * * *'    # каждый день в 3:00 UTC
  workflow_dispatch:       # кнопка запуска вручную

permissions:
  contents: write         # ← ЭТО КЛЮЧЕВОЕ! Даёт права на push

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # пока оставляем v4, можно позже обновить

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run merger
        run: python merge_subs.py

      - name: Commit and push changes
        run: |
          git config --global user.name "MegaSub Bot"
          git config --global user.email "bot@github.com"
          git add merged_subs.txt
          if git diff --staged --quiet; then
            echo "Ничего не изменилось, коммитить нечего"
          else
            git commit -m "Auto-merge $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
