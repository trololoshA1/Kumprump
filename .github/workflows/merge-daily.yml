name: Daily Mega-Sub Merge

on:
  schedule:
    - cron: '0 3 * * *'      # каждый день в 3:00 UTC (6:00 МСК)
  workflow_dispatch:         # кнопка для ручного запуска

permissions:
  contents: write            # обязательно для записи файлов

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests geoip2

      - name: Run merger script
        run: python merge_subs.py

      - name: Commit and push changes
        run: |
          git config --global user.name "MegaSub Bot"
          git config --global user.email "bot@github.com"
          
          # Добавляем все новые папки с разделением
          git add subs/
          
          if git diff --staged --quiet; then
            echo "Ничего не изменилось"
          else
            git commit -m "Auto-merge $(date +'%Y-%m-%d %H:%M UTC') - RU + World split"
            git push
          fi